<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Barcode Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <style>
    :root {
      --btn: var(--tg-theme-button-color, #3390ec);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --bg: var(--tg-theme-bg-color, #111118);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #888);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c2a);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #video {
      flex: 1;
      width: 100%;
      object-fit: cover;
      display: block;
      min-height: 0;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    .scan-box {
      position: relative; width: 78%; height: 110px;
      border-radius: 10px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
    }
    .corner { position: absolute; width: 24px; height: 24px; border-color: #fff; border-style: solid; }
    .corner.tl { top:-2px;    left:-2px;  border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
    .corner.tr { top:-2px;    right:-2px; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
    .corner.bl { bottom:-2px; left:-2px;  border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
    .corner.br { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
    .scanline {
      position: absolute; left:6px; right:6px; height:2px;
      background: linear-gradient(90deg, transparent, var(--btn) 20%, var(--btn) 80%, transparent);
      animation: sweep 2s ease-in-out infinite; border-radius:2px;
    }
    @keyframes sweep {
      0%   { top:4px; opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { top:calc(100% - 4px); opacity:0; }
    }
    #flash {
      position:absolute; inset:0; background:#fff; opacity:0;
      pointer-events:none; z-index:10; transition:opacity 0.05s;
    }
    #flash.on { opacity:0.4; }

    /* ── Panel ── */
    #panel {
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px 16px 36px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      z-index: 20;
    }
    #status {
      font-size:13px; font-weight:500; color:var(--hint);
      text-align:center; min-height:20px;
      display:flex; align-items:center; gap:7px;
    }
    #status.live  { color:var(--btn); }
    #status.found { color:#2ecc71; }
    #status.err   { color:#e74c3c; }
    .pulse { animation:pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Barcode result ── */
    #result { display:none; flex-direction:column; align-items:center; gap:12px; width:100%; }

    .barcode-box {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
      cursor: pointer;
      touch-action: manipulation;
    }
    .barcode-label {
      font-size: 10px; color: var(--hint);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .barcode-value {
      font-size: 26px; font-weight: 700;
      letter-spacing: 3px; color: var(--btn);
      word-break: break-all;
    }
    .copy-hint {
      font-size: 11px; color: var(--hint); margin-top: 5px;
    }

    /* Copy confirmation */
    #copied {
      display:none;
      background: #2ecc71;
      color: #fff;
      font-size: 14px; font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      animation: fadeout 1.5s forwards;
    }
    @keyframes fadeout {
      0%,60%  { opacity:1; }
      100%    { opacity:0; }
    }

    .btn-row { display:flex; gap:10px; width:100%; }
    .btn {
      flex:1; border:none; border-radius:12px;
      padding:14px; font-size:15px; font-weight:600;
      cursor:pointer; touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active { opacity:0.7; }
    .btn-primary   { background:var(--btn); color:var(--btn-text); }
    .btn-secondary { background:rgba(255,255,255,0.09); color:var(--text); }
  </style>
</head>
<body>

  <video id="video" autoplay muted playsinline webkit-playsinline></video>

  <div id="overlay">
    <div class="scan-box">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scanline"></div>
    </div>
  </div>
  <div id="flash"></div>

  <div id="panel">
    <div id="status" class="live">
      <span class="pulse">●</span>&nbsp;Align barcode in frame
    </div>

    <div id="result">
      <!-- Tap to copy -->
      <div class="barcode-box" id="barcode-box">
        <div class="barcode-label">Barcode detected — tap to copy</div>
        <div class="barcode-value" id="barcode-value"></div>
        <div class="copy-hint">👆 Tap to copy</div>
      </div>

      <div id="copied">✅ Copied!</div>

      <div class="btn-row">
        <button class="btn btn-primary"   id="btn-close">Close & Paste</button>
        <button class="btn btn-secondary" id="btn-again">🔄 Scan Again</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const video      = document.getElementById('video');
    const statusEl   = document.getElementById('status');
    const resultEl   = document.getElementById('result');
    const barcodeVal = document.getElementById('barcode-value');
    const barcodeBox = document.getElementById('barcode-box');
    const copiedEl   = document.getElementById('copied');
    const btnClose   = document.getElementById('btn-close');
    const btnAgain   = document.getElementById('btn-again');
    const flash      = document.getElementById('flash');

    let stream      = null;
    let detecting   = false;
    let rafId       = null;
    let zxingReader = null;
    let lastBarcode = null;

    function setStatus(html, cls='live') {
      statusEl.className = 'status ' + cls;
      statusEl.innerHTML = html;
    }

    function doFlash() {
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 120);
    }

    function copyBarcode() {
      if (!lastBarcode) return;
      navigator.clipboard.writeText(lastBarcode).then(() => {
        copiedEl.style.display = 'block';
        // Re-trigger animation
        copiedEl.style.animation = 'none';
        copiedEl.offsetHeight; // reflow
        copiedEl.style.animation = 'fadeout 1.5s forwards';
        setTimeout(() => { copiedEl.style.display = 'none'; }, 1500);
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      }).catch(() => {
        // Fallback for browsers that block clipboard
        const el = document.createElement('textarea');
        el.value = lastBarcode;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.focus(); el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        copiedEl.style.display = 'block';
        setTimeout(() => { copiedEl.style.display = 'none'; }, 1500);
      });
    }

    function showResult(code) {
      if (!detecting) return;
      detecting   = false;
      lastBarcode = code.trim();

      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (zxingReader) { try { zxingReader.reset(); } catch(e){} }

      doFlash();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

      barcodeVal.textContent  = lastBarcode;
      resultEl.style.display  = 'flex';
      setStatus('✅ Barcode found!', 'found');

      // Auto-copy immediately so user just has to paste
      navigator.clipboard.writeText(lastBarcode).catch(() => {});
    }

    // Tap barcode box to copy
    barcodeBox.addEventListener('click', copyBarcode);

    // Close mini app (barcode already auto-copied)
    btnClose.addEventListener('click', () => {
      copyBarcode();
      setTimeout(() => tg.close(), 300);
    });

    btnAgain.addEventListener('click', () => start());

    // ── Camera ────────────────────────────────────────
    async function getStream() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
    }

    async function runAndroid() {
      let formats;
      try { formats = await BarcodeDetector.getSupportedFormats(); }
      catch(e) { formats = ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf']; }
      const detector = new BarcodeDetector({ formats });
      async function loop() {
        if (!detecting) return;
        if (video.readyState >= 2) {
          try {
            const res = await detector.detect(video);
            if (res.length > 0) { showResult(res[0].rawValue); return; }
          } catch(e) {}
        }
        rafId = requestAnimationFrame(loop);
      }
      detecting = true;
      loop();
    }

    function runIOS() {
      if (zxingReader) { try { zxingReader.reset(); } catch(e){} }
      zxingReader = new ZXing.BrowserMultiFormatReader();
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.ITF, ZXing.BarcodeFormat.DATA_MATRIX,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      zxingReader.hints = hints;
      detecting = true;
      zxingReader.decodeFromStream(stream, video, (result) => {
        if (!detecting || !result) return;
        onBarcode(result.getText());
      });
    }

    async function start() {
      resultEl.style.display = 'none';
      lastBarcode = null;
      detecting   = false;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      if (zxingReader) { try { zxingReader.reset(); } catch(e){} zxingReader = null; }

      setStatus('<span class="pulse">●</span>&nbsp;Starting camera…', 'live');
      try {
        await getStream();
      } catch(err) {
        setStatus('❌ Camera denied — allow in Telegram settings', 'err');
        return;
      }
      setStatus('<span class="pulse">●</span>&nbsp;Align barcode in frame', 'live');
      'BarcodeDetector' in window ? runAndroid() : runIOS();
    }

    start();
  </script>
</body>
</html>
