<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Barcode Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --btn: var(--tg-theme-button-color, #3390ec);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --bg: var(--tg-theme-bg-color, #111118);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #888);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c2a);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Full-screen video ── */
    #video {
      flex: 1;
      width: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* ── Targeting overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dimmer-top, .dimmer-bottom, .dimmer-left, .dimmer-right {
      position: absolute;
      background: rgba(0,0,0,0.5);
    }
    /* These four divs create the "hole" in the middle */

    .scan-box {
      position: relative;
      width: 78%;
      height: 120px;
      border-radius: 10px;
      z-index: 2;
    }

    /* Corners */
    .corner {
      position: absolute;
      width: 24px; height: 24px;
      border-color: #fff;
      border-style: solid;
    }
    .corner.tl { top:-2px; left:-2px;   border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top:-2px; right:-2px;  border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom:-2px; left:-2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom:-2px; right:-2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    /* Scan line */
    .scanline {
      position: absolute;
      left: 6px; right: 6px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--btn) 20%, var(--btn) 80%, transparent);
      animation: sweep 2s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes sweep {
      0%   { top: 4px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 4px); opacity: 0; }
    }

    /* Flash */
    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.05s;
    }
    #flash.on { opacity: 0.5; }

    /* ── Bottom panel ── */
    #panel {
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 14px 18px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 20;
    }

    #status {
      font-size: 14px;
      font-weight: 500;
      color: var(--hint);
      text-align: center;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status.live    { color: var(--btn); }
    #status.found   { color: #2ecc71; }
    #status.err     { color: #e74c3c; }

    .pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Result */
    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .barcode-num {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--btn);
      word-break: break-all;
      text-align: center;
    }
    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn {
      flex: 1; border: none; border-radius: 12px;
      padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.1s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: var(--btn); color: var(--btn-text); }
    .btn-secondary { background: rgba(255,255,255,0.09); color: var(--text); }

    /* Debug log — hidden in prod */
    #log {
      position: absolute;
      top: 8px; left: 8px; right: 8px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-size: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      font-family: monospace;
      z-index: 30;
      max-height: 90px;
      overflow: hidden;
      display: none; /* set to block to debug */
    }
  </style>
</head>
<body>

  <video id="video" autoplay muted playsinline></video>

  <div id="overlay">
    <div class="scan-box">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scanline"></div>
    </div>
  </div>

  <div id="flash"></div>
  <div id="log"></div>

  <div id="panel">
    <div id="status" class="live">
      <span class="pulse">●</span> Starting camera…
    </div>
    <div id="result">
      <div class="barcode-num" id="barcode-num"></div>
      <div class="btn-row">
        <button class="btn btn-primary"   id="btn-send">✅ Send to Bot</button>
        <button class="btn btn-secondary" id="btn-again">🔄 Scan Again</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const video     = document.getElementById('video');
    const statusEl  = document.getElementById('status');
    const resultEl  = document.getElementById('result');
    const barcodeEl = document.getElementById('barcode-num');
    const flash     = document.getElementById('flash');
    const logEl     = document.getElementById('log');
    const btnSend   = document.getElementById('btn-send');
    const btnAgain  = document.getElementById('btn-again');

    let detecting   = false;
    let lastBarcode = null;
    let rafId       = null;
    let detector    = null;
    let stream      = null;

    function log(msg) {
      logEl.textContent = msg + '\n' + logEl.textContent;
    }

    function setStatus(html, cls = 'live') {
      statusEl.className = 'status ' + cls;
      statusEl.innerHTML = html;
    }

    function doFlash() {
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 120);
    }

    function onFound(code) {
      if (!detecting) return;
      detecting = false;
      if (rafId) cancelAnimationFrame(rafId);

      lastBarcode = code.trim();
      log('Found: ' + lastBarcode);

      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      doFlash();

      barcodeEl.textContent   = lastBarcode;
      resultEl.style.display  = 'flex';
      setStatus('✅ Barcode detected!', 'found');
    }

    // ── Scan loop using BarcodeDetector ──────────────────────
    async function scanLoop() {
      if (!detecting) return;
      if (video.readyState < 2) {
        rafId = requestAnimationFrame(scanLoop);
        return;
      }
      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          onFound(barcodes[0].rawValue);
          return;
        }
      } catch (e) {
        log('detect err: ' + e.message);
      }
      rafId = requestAnimationFrame(scanLoop);
    }

    // ── Start camera + detector ───────────────────────────────
    async function start() {
      resultEl.style.display = 'none';
      lastBarcode  = null;
      detecting    = false;
      if (rafId) cancelAnimationFrame(rafId);

      setStatus('<span class="pulse">●</span> Starting camera…', 'live');

      // ── Step 1: check BarcodeDetector support ──
      if (!('BarcodeDetector' in window)) {
        log('BarcodeDetector not supported');
        setStatus('❌ Live scanning not supported on this device/browser', 'err');
        return;
      }

      // ── Step 2: get supported formats ──
      let formats;
      try {
        formats = await BarcodeDetector.getSupportedFormats();
        log('Formats: ' + formats.join(', '));
      } catch(e) {
        formats = ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','data_matrix'];
      }

      detector = new BarcodeDetector({ formats });

      // ── Step 3: get camera stream ──
      try {
        if (stream) stream.getTracks().forEach(t => t.stop());

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1280 },
            height: { ideal: 720 },
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        log('Camera started');

        setStatus('<span class="pulse">●</span> Align barcode in frame', 'live');
        detecting = true;
        scanLoop();

      } catch(err) {
        log('Camera err: ' + err.name + ' ' + err.message);
        if (err.name === 'NotAllowedError') {
          setStatus('❌ Camera permission denied — check Telegram settings', 'err');
        } else {
          setStatus('❌ Camera error: ' + err.message, 'err');
        }
      }
    }

    btnSend.addEventListener('click',  () => { if (lastBarcode) tg.sendData(lastBarcode); });
    btnAgain.addEventListener('click', () => start());

    start();
  </script>
</body>
</html>
