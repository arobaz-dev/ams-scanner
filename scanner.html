<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Barcode Scanner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <style>
    :root {
      --bg:   var(--tg-theme-bg-color, #111118);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #888888);
      --btn:  var(--tg-theme-button-color, #3390ec);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c2a);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* ── Camera viewport ── */
    #viewport {
      position: relative;
      width: 100%;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    /* Quagga injects a <video> and <canvas> here */
    #viewport video,
    #viewport canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    /* Hide Quagga's debug canvas by default */
    #viewport canvas.drawingBuffer { display: none; }

    /* ── Targeting overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .scan-zone {
      width: 80%;
      height: 22%;
      position: relative;
      border-radius: 8px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.52);
    }

    /* Corner brackets */
    .c { position: absolute; width: 22px; height: 22px; border-color: #fff; border-style: solid; }
    .tl { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 5px 0 0 0; }
    .tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 5px 0 0; }
    .bl { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 5px; }
    .br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 5px 0; }

    /* Animated scan line */
    .scan-line {
      position: absolute;
      left: 6px; right: 6px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--btn) 30%, var(--btn) 70%, transparent);
      border-radius: 2px;
      animation: sweep 2s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { top: 6px;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    /* Flash on detect */
    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.35);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 0.05s;
    }
    .flash.active { opacity: 1; }

    /* ── Bottom panel ── */
    #panel {
      width: 100%;
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 14px 18px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 30;
    }

    #status {
      font-size: 14px;
      color: var(--hint);
      font-weight: 500;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
    }
    #status.scanning { color: var(--btn); }
    #status.found    { color: #27ae60; }
    #status.error    { color: #e74c3c; }

    .dot { display: inline-block; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Result row — shown after detection */
    #result-row {
      display: none;
      width: 100%;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .barcode-display {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 16px;
      width: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--btn);
      word-break: break-all;
    }

    .btn-row { display: flex; gap: 10px; width: 100%; }
    .btn {
      flex: 1; border: none; border-radius: 12px;
      padding: 13px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-send  { background: var(--btn); color: var(--btn-text); }
    .btn-again { background: rgba(255,255,255,0.09); color: var(--text); }

    /* ── Permission error ── */
    #perm-error {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 40;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 14px;
    }
    #perm-error h2 { font-size: 20px; }
    #perm-error p  { font-size: 14px; color: var(--hint); line-height: 1.7; }
    .retry-btn {
      margin-top: 8px;
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Camera area -->
  <div id="viewport">
    <div class="overlay">
      <div class="scan-zone">
        <div class="c tl"></div>
        <div class="c tr"></div>
        <div class="c bl"></div>
        <div class="c br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="flash" id="flash"></div>

    <!-- Camera permission error overlay -->
    <div id="perm-error">
      <div style="font-size:52px">📷</div>
      <h2>Camera Access Needed</h2>
      <p>
        Please allow camera access when prompted.<br><br>
        If you already denied it, go to:<br>
        <strong>Phone Settings → Apps → Telegram → Permissions → Camera → Allow</strong>
      </p>
      <button class="retry-btn" onclick="initScanner()">Try Again</button>
    </div>
  </div>

  <!-- Bottom panel -->
  <div id="panel">
    <div id="status" class="scanning">
      <span class="dot">●</span> Starting camera…
    </div>

    <div id="result-row">
      <div class="barcode-display" id="barcode-val"></div>
      <div class="btn-row">
        <button class="btn btn-send"  id="btn-send">✅ Send to Bot</button>
        <button class="btn btn-again" id="btn-again">🔄 Scan Again</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const statusEl   = document.getElementById('status');
    const resultRow  = document.getElementById('result-row');
    const barcodeVal = document.getElementById('barcode-val');
    const btnSend    = document.getElementById('btn-send');
    const btnAgain   = document.getElementById('btn-again');
    const flash      = document.getElementById('flash');
    const permError  = document.getElementById('perm-error');

    let lastBarcode  = null;
    let running      = false;

    // Debounce — ignore repeated reads of same barcode
    let lastRead = '';
    let lastReadTime = 0;

    function setStatus(html, type = '') {
      statusEl.className = 'status ' + type;
      statusEl.innerHTML = html;
    }

    function doFlash() {
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 120);
    }

    function onDetected(result) {
      const code = result.codeResult.code;
      const now  = Date.now();

      // Debounce: same code within 2 seconds = ignore
      if (code === lastRead && now - lastReadTime < 2000) return;
      lastRead     = code;
      lastReadTime = now;

      if (!running) return;
      running = false;

      Quagga.stop();

      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      doFlash();

      lastBarcode = code.trim();
      barcodeVal.textContent = lastBarcode;
      resultRow.style.display = 'flex';
      setStatus('✅ Barcode found!', 'found');
    }

    function initScanner() {
      permError.style.display = 'none';
      resultRow.style.display = 'none';
      lastBarcode = null;
      running     = false;
      setStatus('<span class="dot">●</span> Starting camera…', 'scanning');

      Quagga.init({
        inputStream: {
          name: 'Live',
          type: 'LiveStream',
          target: document.getElementById('viewport'),
          constraints: {
            facingMode: 'environment',   // rear camera
            width:  { min: 640, ideal: 1280 },
            height: { min: 480, ideal: 720 },
          },
          area: {
            // Only scan the middle strip — faster & more accurate
            top:    '35%',
            right:  '10%',
            bottom: '35%',
            left:   '10%',
          },
        },
        decoder: {
          readers: [
            'ean_reader',        // EAN-13 (most common product barcodes)
            'ean_8_reader',      // EAN-8
            'code_128_reader',   // Code 128
            'code_39_reader',    // Code 39
            'upc_reader',        // UPC-A
            'upc_e_reader',      // UPC-E
            'i2of5_reader',      // Interleaved 2 of 5
          ],
        },
        locate: true,
        numOfWorkers: 2,
        frequency: 15,           // scan attempts per second
      },
      function(err) {
        if (err) {
          console.error('Quagga init error:', err);
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError' ||
              String(err).includes('Permission') || String(err).includes('denied')) {
            permError.style.display = 'flex';
            setStatus('❌ Camera permission denied', 'error');
          } else {
            setStatus('❌ Camera error: ' + (err.message || err), 'error');
          }
          return;
        }

        Quagga.start();
        running = true;
        setStatus('<span class="dot">●</span> Align barcode in frame', 'scanning');
      });

      Quagga.offDetected();   // clear old listeners
      Quagga.onDetected(onDetected);
    }

    btnSend.addEventListener('click', () => {
      if (lastBarcode) tg.sendData(lastBarcode);
    });

    btnAgain.addEventListener('click', () => {
      running = false;
      Quagga.stop();
      initScanner();
    });

    // Start immediately
    initScanner();
  </script>
</body>
</html>
